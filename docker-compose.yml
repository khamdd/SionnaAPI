name: sionna-simulation

services:
  postgres:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sionna}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sionna-local-password}
      POSTGRES_DB: ${POSTGRES_DB:-sionna_simulation}
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 5s
      timeout: 5s
      retries: 20

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms1g -Xmx1g
    ports:
      - "127.0.0.1:9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS http://localhost:9200 >/dev/null || exit 1
      interval: 10s
      timeout: 5s
      retries: 20

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.3
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      SERVER_DEFAULTROUTE: /app/discover
    ports:
      - "127.0.0.1:5601:5601"

  observability-setup:
    image: sionna-simulation-backend:local
    pull_policy: never
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: "no"
    environment:
      ELASTICSEARCH_URL: http://elasticsearch:9200
      ELASTICSEARCH_INDEX: ${ELASTICSEARCH_INDEX:-sionna-logs-dev}
      ELASTICSEARCH_LOG_RETENTION_DAYS: ${ELASTICSEARCH_LOG_RETENTION_DAYS:-30}
      KIBANA_URL: http://kibana:5601
    depends_on:
      elasticsearch:
        condition: service_healthy
      kibana:
        condition: service_started
    command:
      - python
      - backend/observability_setup.py

  backend:
    image: sionna-simulation-backend:local
    pull_policy: never
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-sionna}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sionna-local-password}
      POSTGRES_DB: ${POSTGRES_DB:-sionna_simulation}
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY:-docker-local-change-this-secret}
      ELASTICSEARCH_ENABLED: "true"
      ELASTICSEARCH_URL: http://elasticsearch:9200
      ELASTICSEARCH_INDEX: ${ELASTICSEARCH_INDEX:-sionna-logs-dev}
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      observability-setup:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - application-static:/app/static
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"
      interval: 10s
      timeout: 5s
      retries: 20

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:80"

volumes:
  postgres-data:
  elasticsearch-data:
  application-static:
