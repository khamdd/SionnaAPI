<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sionna Network Planner</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="map-panel" aria-label="Coverage map">
        <div class="topbar">
          <div>
            <h1>Munich Coverage Planner</h1>
            <p id="run-status">Ready</p>
          </div>
          <button id="run-simulation" class="primary-button" type="button">
            Run simulation
          </button>
        </div>

        <div id="map-stage" class="map-stage">
          <img id="coverage-image" alt="Top-down coverage map" />
          <canvas id="heat-layer"></canvas>
          <div id="antenna-layer"></div>
          <div id="hover-card" class="hover-card hidden"></div>
        </div>

        <div class="metric-strip">
          <div>
            <span>Cell size</span>
            <strong id="cell-size-label">5 m</strong>
          </div>
          <div>
            <span>Best SINR</span>
            <strong id="best-sinr-label">--</strong>
          </div>
          <div>
            <span>Median throughput</span>
            <strong id="median-throughput-label">--</strong>
          </div>
          <div>
            <span>Serving cells</span>
            <strong id="cell-count-label">--</strong>
          </div>
        </div>
      </section>

      <aside class="control-panel" aria-label="Antenna controls">
        <div class="panel-header">
          <h2 id="panel-title">Antenna sectors</h2>
          <div class="panel-actions">
            <button id="reset-antennas" class="ghost-button" type="button">
              Reset
            </button>
            <button id="refresh-history" class="ghost-button hidden" type="button">
              Refresh
            </button>
          </div>
        </div>
        <div class="panel-tabs" role="tablist" aria-label="Side panel views">
          <button id="antennas-tab" class="tab-button active" type="button">
            Antennas
          </button>
          <button id="history-tab" class="tab-button" type="button">
            History
          </button>
        </div>
        <div id="antenna-list" class="antenna-list"></div>
        <div id="history-view" class="history-view hidden">
          <p id="history-status" class="history-status">No history loaded.</p>
          <div id="history-list" class="history-list"></div>
          <section id="history-detail" class="history-detail hidden"></section>
        </div>
      </aside>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
